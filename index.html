// DATA MIGRATION — ensures old localStorage records have all required fields
// Run once after load() to patch any missing fields before rendering
// ═══════════════════════════════════════════════════════════════════════════
function migrateTender(t) {
    if (!t || typeof t !== 'object') return null;
    return {
        // Core identity — required, abort if missing
        id:               t.id               ?? null,
        dept:             t.dept             ?? 'AIMS-Projects',
        tenderName:       t.tenderName       ?? '(Unnamed)',
        tenderNumber:     t.tenderNumber     ?? '',
        tenderType:       t.tenderType       ?? '',
        status:           t.status           ?? 'Pending',
        priority:         t.priority         ?? 'Medium',
        // Dates
        issueDate:        t.issueDate        ?? '',
        closingDate:      t.closingDate      ?? '',
        awardDate:        t.awardDate        ?? '',
        // People
        client:           t.client           ?? '',
        contactName:      t.contactName      ?? '',
        contactEmail:     t.contactEmail     ?? '',
        accountManager:   t.accountManager   ?? '',
        oppOwner:         t.oppOwner         ?? '',
        vendor:           t.vendor           ?? '',
        // Financials
        ourBid:           t.ourBid           != null ? Number(t.ourBid) : null,
        price:            t.price            != null ? Number(t.price)  : null,
        currency:         t.currency         ?? 'KWD',
        // Pre-tender
        preTenderMeeting: t.preTenderMeeting ?? '',
        preTenderAttended:t.preTenderAttended?? '',
        meetingNotes:     t.meetingNotes     ?? '',
        // Notes
        solutionBrief:    t.solutionBrief    ?? '',
        remarks:          t.remarks          ?? '',
        // New fields (Phase 1-3 additions — safely default for older records)
        tags:             Array.isArray(t.tags) ? t.tags : [],
        contactPhone:     t.contactPhone     ?? '',
        // P1 fields (added in recent sessions — may be missing in old data)
        lossReason:       t.lossReason       ?? '',
        lossNote:         t.lossNote         ?? '',
        followUpDate:     t.followUpDate     ?? '',
        competitorName:   t.competitorName   ?? '',
        // Arrays — must always be arrays
        competitorBids:   Array.isArray(t.competitorBids) ? t.competitorBids : [],
        comments:         Array.isArray(t.comments)       ? t.comments       : [],
        docs:             Array.isArray(t.docs)            ? t.docs            : [],
        statusHistory:    Array.isArray(t.statusHistory)  ? t.statusHistory  : [{ status: t.status ?? 'Pending', date: '' }],
        // Bid bond — ensure object with all keys
        bidBond:          migrateBidBond(t.bidBond),
        // Meta
        fiscalYear:       t.fiscalYear ?? '',
        createdAt:        t.createdAt  ?? '',
        updatedAt:        t.updatedAt  ?? '',
    };
}
function migrateBidBond(bb) {
    if (!bb || typeof bb !== 'object') return { amount: null, currency: 'KWD', bank: '', issueDate: '', expiryDate: '', bbStatus: 'N/A', extensions: [], notes: '', bankBondValue: null, bankBondDate: '' };
    return {
        amount:        bb.amount        ?? null,
        currency:      bb.currency      ?? 'KWD',
        bank:          bb.bank          ?? '',
        issueDate:     bb.issueDate     ?? '',
        expiryDate:    bb.expiryDate    ?? '',
        bbStatus:      bb.bbStatus      ?? 'N/A',
        extensions:    Array.isArray(bb.extensions) ? bb.extensions : [],
        notes:         bb.notes         ?? '',
        bankBondValue: bb.bankBondValue ?? null,
        bankBondDate:  bb.bankBondDate  ?? '',

}
function migrateAll(data) {
    if (!Array.isArray(data)) return null;

function calcWinScore(tender, allTenders) {
    const closed = allTenders.filter(t => t.status === "Won" || t.status === "Lost");
    if (closed.length < 3) return null;
    const wins = closed.filter(t => t.status === "Won").length;
    let score = wins / closed.length;
    const deptClosed = closed.filter(t => t.dept === tender.dept);
    if (deptClosed.length >= 2) {
        score = score * 0.4 + (deptClosed.filter(t => t.status === "Won").length / deptClosed.length) * 0.6;
    }
    if (tender.priority === "High") score = Math.min(1, score * 1.15);
    else if (tender.priority === "Low") score = score * 0.9;
    const compCount = (tender.competitorBids || []).length;
    if (compCount >= 3) score = score * 0.85;
    else if (compCount === 0) score = Math.min(1, score * 1.1);
    if (!tender.oppOwner && !tender.accountManager) score = score * 0.88;
    const d = dLeft(tender.closingDate);
    if (d !== null && d <= 2) score = score * 0.85;
    return Math.round(Math.min(99, Math.max(5, score * 100)));
}

  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
  ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  ::-webkit-scrollbar-track { background: transparent; }

  /* ── Animations ─────────────────────────────────────────────────────────── */

  [data-theme="dark"] {
    --navy: #1a3a6b; --navy-d: #0f2548; --navy-m: #243f7a;
    --bg: #0f172a; --surface: #1e293b; --surface-2: #263042; --surface-3: #1e293b;
    --border: #334155; --border-l: #2d3f52;
    --text: #f1f5f9; --text-2: #cbd5e1; --text-3: #94a3b8; --text-4: #64748b; --slate: #94a3b8;
    --blue: #60a5fa; --blue-d: #3b82f6; --blue-l: #1e3a5f; --blue-ll: #1e3a5f;
    --success: #4ade80; --success-l: #14532d; --success-b: #166534;
    --danger: #f87171; --danger-l: #450a0a; --danger-b: #7f1d1d;
    --warning: #fbbf24; --warning-l: #451a03; --warning-b: #92400e;
    --purple: #c084fc; --purple-l: #3b0764; --purple-b: #6b21a8;
    --cyan: #22d3ee; --cyan-l: #164e63; --cyan-b: #0e7490;
    color-scheme: dark;
  }
  @media (max-width: 720px) {
    .sidebar { display: none !important; }
    .mobile-nav { display: flex !important; }
  }
  @media (min-width: 721px) { .mobile-nav { display: none !important; } }
  .mobile-nav {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
    background: var(--navy); border-top: 1px solid rgba(255,255,255,.12);
    display: flex; padding: 6px 0;
  }
  .mobile-nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px;
    padding: 5px 2px; background: none; border: none; cursor: pointer;
    color: rgba(255,255,255,.5); font-family: inherit; }
  .mobile-nav-btn.active { color: #fff; }
  .mobile-nav-btn .mn-icon { font-size: 18px; line-height: 1; }
  .mobile-nav-btn .mn-lbl { font-size: 9px; font-weight: 600; }
  @keyframes spin       { to { transform: rotate(360deg); } }
  @keyframes slideUp    { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: none; } }
  @keyframes slideRight { from { opacity:0; transform: translateX(40px); } to { opacity:1; transform: none; } }
  @keyframes slideLeft  { from { opacity:0; transform: translateX(-20px); } to { opacity:1; transform: none; } }
  @keyframes fadeIn     { from { opacity:0; } to { opacity:1; } }
  @keyframes popIn      { from { opacity:0; transform: scale(.94); } to { opacity:1; transform: scale(1); } }
  @keyframes shimmer    { 0%{background-position:-400px 0} 100%{background-position:400px 0} }
  @keyframes pulse      { 0%,100%{opacity:1} 50%{opacity:.5} }
  @keyframes badgePop   { 0%{transform:scale(.6)} 60%{transform:scale(1.15)} 100%{transform:scale(1)} }

  /* ── Focus ──────────────────────────────────────────────────────────────── */
  button:focus-visible { outline: 2px solid var(--blue); outline-offset: 2px; border-radius: var(--r-sm); }
  input:focus, select:focus, textarea:focus {
    border-color: var(--blue) !important;
    box-shadow: 0 0 0 3px rgba(30,102,212,.14) !important;
    outline: none;
  }

  /* ════════════════════════════════════════════════════════════════════════
     SIDEBAR NAVIGATION  (replaces top tabs on desktop)
  ════════════════════════════════════════════════════════════════════════ */
  .app-shell      { display: flex; min-height: 100vh; }
  .sidebar        { width: var(--sidebar-w); background: var(--sidebar-bg);
                    display: flex; flex-direction: column;
                    position: fixed; top: 0; left: 0; bottom: 0; z-index: 300;
                    transition: width var(--t-in);
                    box-shadow: 2px 0 20px rgba(0,0,0,.15); }
  .sidebar.collapsed { width: var(--sidebar-w-col); }
  .sidebar-header { padding: 18px 16px 14px; display: flex; align-items: center;
                    gap: 10px; border-bottom: 1px solid var(--sidebar-border);
                    min-height: 66px; flex-shrink: 0; }
  .sidebar-logo   { width: 34px; height: 34px; border-radius: 9px; flex-shrink: 0;
                    display: flex; align-items: center; justify-content: center;
                    box-shadow: var(--sh-navy); overflow: hidden; }
  .sidebar-title  { font-size: 15px; font-weight: 800; color: #fff;
                    letter-spacing: -.04em; line-height: 1.1; white-space: nowrap; }
  .sidebar-sub    { font-size: 9.5px; font-weight: 500; color: rgba(255,255,255,.45);
                    letter-spacing: .05em; text-transform: uppercase; margin-top: 1px; }
  .sidebar-collapse { position: absolute; top: 20px; right: -11px;
                      width: 22px; height: 22px; border-radius: 50%;
                      background: var(--surface); border: 1.5px solid var(--border);
                      display: flex; align-items: center; justify-content: center;
                      cursor: pointer; color: var(--slate); box-shadow: var(--sh-sm);
                      transition: all var(--t); z-index: 2; }
  .sidebar-collapse:hover { background: var(--blue); color: #fff; border-color: var(--blue); }

  /* Nav items */
  .sidebar-nav    { flex: 1; overflow-y: auto; overflow-x: hidden;
                    padding: 10px 8px; scrollbar-width: none; }
  .sidebar-nav::-webkit-scrollbar { display: none; }
  .sidebar-section-label { font-size: 9.5px; font-weight: 700; color: rgba(255,255,255,.3);
                            text-transform: uppercase; letter-spacing: .1em;
                            padding: 10px 8px 4px; white-space: nowrap; overflow: hidden; }
  .nav-item       { display: flex; align-items: center; gap: 10px;
                    padding: 9px 10px; border-radius: var(--r-md);
                    color: rgba(255,255,255,.65); font-size: 13px; font-weight: 500;
                    cursor: pointer; transition: all var(--t); white-space: nowrap;
                    position: relative; margin-bottom: 1px; border: none; background: none;
                    width: 100%; text-align: left; font-family: inherit; }
  .nav-item:hover { background: rgba(255,255,255,.1); color: #fff; }
  .nav-item.active { background: rgba(255,255,255,.15); color: #fff; font-weight: 600; }
  .nav-item.active::before { content:''; position:absolute; left:0; top:25%; bottom:25%;
                              width:3px; border-radius:0 3px 3px 0; background:var(--blue); }
  .nav-item-icon  { width: 18px; height: 18px; flex-shrink: 0; opacity: .85; }
  .nav-item.active .nav-item-icon { opacity: 1; }
  .nav-item-label { flex: 1; overflow: hidden; text-overflow: ellipsis; }
  .nav-badge      { font-size: 9.5px; font-weight: 800; padding: 1px 6px;
                    border-radius: 20px; background: var(--danger); color: #fff;
                    animation: badgePop .25s ease; flex-shrink: 0; }
  .nav-badge.warn { background: var(--warning); }

  /* Sidebar footer */
  .sidebar-footer { padding: 10px 8px 16px; border-top: 1px solid var(--sidebar-border); flex-shrink: 0; }
  .sidebar-footer .nav-item { font-size: 12px; }

  /* Sidebar tooltip (collapsed state) */
  .sidebar.collapsed .nav-item-label,
  .sidebar.collapsed .sidebar-section-label,
  .sidebar.collapsed .sidebar-title,
  .sidebar.collapsed .sidebar-sub { display: none; }
  .sidebar.collapsed .nav-item    { justify-content: center; padding: 9px; }
  .sidebar.collapsed .sidebar-header { justify-content: center; }
  .sidebar.collapsed .nav-badge   { position: absolute; top: 4px; right: 4px;
                                    padding: 0; width: 8px; height: 8px;
                                    border-radius: 50%; font-size: 0; }

  /* Sidebar collapsed state via app-shell class */
  .sidebar-collapsed .sidebar     { width: var(--sidebar-w-col); }
  .sidebar-collapsed .nav-item-label,
  .sidebar-collapsed .sidebar-section-label,
  .sidebar-collapsed .sidebar-title,
  .sidebar-collapsed .sidebar-sub,
  .sidebar-collapsed .sidebar-title-wrap { display: none; }
  .sidebar-collapsed .nav-item    { justify-content: center; padding: 9px; }
  .sidebar-collapsed .sidebar-header { justify-content: center; }
  .sidebar-collapsed .nav-badge   { position: absolute; top: 4px; right: 4px;
                                    padding: 0; width: 8px; height: 8px;
                                    border-radius: 50%; font-size: 0; }
  .sidebar-collapsed .main-area   { margin-left: var(--sidebar-w-col); }

  /* Sidebar title wrap */
  .sidebar-title-wrap { overflow: hidden; flex: 1; min-width: 0; }

  /* Nav badge colors */
  .nav-badge.danger  { background: var(--danger); }
  .nav-badge.info    { background: var(--info); }
  .nav-badge.warn    { background: var(--warning); }
  .nav-badge.success { background: var(--success); }

  /* Main content area shifts right */
  .main-area      { flex: 1; margin-left: var(--sidebar-w); display: flex;
                    flex-direction: column; min-height: 100vh;
                    transition: margin-left var(--t-in); }
  .main-area.expanded { margin-left: var(--sidebar-w-col); }

  /* Page-wrap inside main-area */
  .page-wrap { flex: 1; overflow-y: auto;
               padding: clamp(16px,2vw,24px) clamp(14px,2vw,28px) 80px;
               animation: fadeIn .35s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); }
                      to   { opacity: 1; transform: none; } }

  /* ── Top bar (inside main-area, no tabs) ────────────────────────────── */
  .top-bar        { background: var(--surface); border-bottom: 1px solid var(--border);
                    padding: 0 clamp(16px,2vw,28px);
                    display: flex; align-items: center; gap: 10px;
                    height: 58px; flex-shrink: 0;
                    position: sticky; top: 0; z-index: 200;
                    box-shadow: var(--sh-xs); }
  .top-bar-title  { font-size: 17px; font-weight: 700; color: var(--text);
                    letter-spacing: -.025em; flex: 1; }
  .top-bar-sub    { font-size: 11.5px; color: var(--text-3); margin-top: 1px; }

  /* ── Page ────────────────────────────────────────────────────────────── */
  .page-wrap      { flex: 1; padding: clamp(16px,2vw,24px) clamp(14px,2vw,28px) 80px; }

  /* ── Navigation (legacy top-bar kept for mobile) ────────────────────── */
  .nav-root       { display: none; } /* hidden on desktop — replaced by sidebar */

  /* ── Buttons ─────────────────────────────────────────────────────────── */
  .nav-btn        { display: inline-flex; align-items: center; gap: 6px;
                    padding: 7px 12px; border-radius: var(--r); border: 1px solid var(--border);
                    background: var(--surface-2); color: var(--slate);
                    font-size: 12.5px; font-weight: 500; transition: all var(--t);
                    white-space: nowrap; }
  .nav-btn svg    { width: 14px; height: 14px; flex-shrink: 0; }
  .nav-btn:hover  { background: var(--surface); border-color: #b8c5d6; color: var(--text-2);
                    box-shadow: var(--sh-xs); }
  .nav-btn-primary { background: linear-gradient(135deg, var(--blue), var(--blue-d));
                     border-color: transparent; color: #fff; font-weight: 600;
                     box-shadow: 0 2px 8px rgba(30,102,212,.35); }
  .nav-btn-primary:hover { filter: brightness(1.06);
                           box-shadow: 0 4px 14px rgba(30,102,212,.45);
                           transform: translateY(-1px); }
  .nav-btn-navy   { background: var(--navy); border-color: transparent; color: #fff;
                    font-weight: 600; box-shadow: var(--sh-navy); }
  .nav-btn-navy:hover { background: var(--navy-m); transform: translateY(-1px); }

  /* ── Toolbar buttons ─────────────────────────────────────────────────── */
  .toolbar-btn    { display: inline-flex; align-items: center; gap: 5px;
                    padding: 7px 11px; border-radius: var(--r);
                    border: 1.5px solid var(--border); background: var(--surface);
                    color: var(--slate); font-size: 12.5px; font-weight: 500;
                    transition: all var(--t); white-space: nowrap; font-family: inherit; }
  .toolbar-btn:hover  { border-color: #b8c5d6; color: var(--text-2); background: var(--surface-2); }
  .toolbar-btn.active { border-color: var(--blue); color: var(--blue);
                        background: var(--blue-l); }

  /* ── Cards ───────────────────────────────────────────────────────────── */
  .card           { background: var(--surface); border-radius: var(--r-lg);
                    border: 1px solid var(--border); box-shadow: var(--sh-xs);
                    transition: box-shadow var(--t), transform var(--t); }
  .card:hover     { box-shadow: var(--sh-sm); }
  .card-interactive { cursor: pointer; }
  .card-interactive:hover { box-shadow: var(--sh); transform: translateY(-1px); }
  .card-stat      { background: var(--surface); border-radius: var(--r-xl);
                    border: 1px solid var(--border); box-shadow: var(--sh-xs);
                    padding: 18px 20px; position: relative; overflow: hidden;
                    transition: box-shadow var(--t), transform var(--t); }
  .card-stat::before { content:''; position:absolute; top:0; left:0; right:0; height:3px;
                       background: var(--accent, var(--blue)); border-radius: var(--r-xl) var(--r-xl) 0 0; }

  /* ── Tenders table ───────────────────────────────────────────────────── */
  .tt-row         { transition: background var(--t), border-left-color var(--t); }
  /* Zebra striping — every odd row gets a subtle tint */
  .tt-row:nth-child(odd)  { background: #fafbfc; }
  .tt-row:nth-child(even) { background: var(--surface); }
  /* Hover overrides zebra */
  .tt-row:hover   { background: #f0f5ff !important; }

  /* ── Section headers ─────────────────────────────────────────────────── */
  .section-hdr    { cursor: pointer; border-radius: var(--r-md);
                    transition: background var(--t), filter var(--t); padding: 12px 16px; }
  .section-hdr:hover { filter: brightness(.97); }

  /* ── Drawer ──────────────────────────────────────────────────────────── */
  .drawer-panel   { display: flex; flex-direction: column;
                    box-shadow: -12px 0 48px rgba(15,29,56,.16), -2px 0 8px rgba(0,0,0,.04);
                    animation: slideRight .22s cubic-bezier(.4,0,.2,1);
                    border-left: 1px solid var(--border); }
  .drawer-tab     { transition: all var(--t); border-bottom: 2px solid transparent; }
  .drawer-tab:hover  { background: var(--blue-l) !important; color: var(--blue) !important; }
  .drawer-tab.active { background: var(--blue-l) !important; color: var(--blue) !important;
                       border-bottom-color: var(--blue) !important; }

  /* ── Column toggle menu ──────────────────────────────────────────────── */
  .col-menu       { position: absolute; top: calc(100% + 4px); right: 0;
                    background: var(--surface); border: 1px solid var(--border);
                    border-radius: var(--r-md); box-shadow: var(--sh-md);
                    z-index: 300; padding: 5px; min-width: 172px;
                    animation: popIn .15s ease; }
  .col-menu label { display: flex; align-items: center; gap: 9px;
                    padding: 7px 10px; border-radius: var(--r-sm);
                    font-size: 13px; transition: background var(--t); cursor: pointer; }
  .col-menu label:hover { background: var(--blue-l); }

  /* ── Pill filter buttons ─────────────────────────────────────────────── */
  .pill-btn       { padding: 5px 13px; border-radius: 20px;
                    border: 1.5px solid var(--border); background: var(--surface);
                    color: var(--slate); font-size: 12px; font-weight: 500;
                    transition: all var(--t); font-family: inherit; }
  .pill-btn:hover  { border-color: #b8c5d6; color: var(--text-2); }
  .pill-btn.active { background: var(--blue); border-color: var(--blue); color: #fff; }

  /* ── Kanban board ────────────────────────────────────────────────────── */
  .kanban-wrap    { display: flex; gap: 10px; align-items: flex-start; }
  .kanban-col     { flex: 0 0 210px; min-width: 0; display: flex; flex-direction: column; }
  .kanban-hdr     { display: flex; align-items: center; gap: 7px; padding: 8px 12px;
                    border-radius: var(--r); margin-bottom: 6px;
                    font-size: 10px; font-weight: 700; text-transform: uppercase;
                    letter-spacing: .06em; }
  .kanban-drop    { border-radius: var(--r-md); border: 1.5px solid transparent;
                    transition: background var(--t), border-color var(--t); }
  .kanban-drop.over { background: var(--blue-l) !important;
                      border-color: var(--blue) !important;
                      border-style: dashed !important; }
  .board-card     { transition: transform var(--t), box-shadow var(--t); }
  .board-card:hover { transform: translateY(-2px); box-shadow: var(--sh-md) !important; }

  /* ── Form ────────────────────────────────────────────────────────────── */
  .inp-base       { width:100%; padding:8px 12px; border-radius:var(--r); font-size:13.5px;
                    border:1.5px solid var(--border); background:var(--surface); color:var(--text);
                    font-family:inherit; transition:border-color var(--t), box-shadow var(--t);
                    line-height:1.5; }
  .inp-base:hover { border-color: #b8c5d6; }
  .inp-base:focus { border-color:var(--blue)!important; box-shadow:0 0 0 3px rgba(30,102,212,.12)!important;
                    outline:none; }
  .inp-label      { font-size:11px; font-weight:600; color:var(--text-3); margin-bottom:5px;
                    display:block; letter-spacing:.01em; text-transform:uppercase; }
  .form-label     { font-size: 11px; font-weight: 600; color: var(--slate);
                    margin-bottom: 5px; letter-spacing: .01em; }

  /* ── Status badges ───────────────────────────────────────────────────── */
  .badge          { display: inline-flex; align-items: center; gap: 4px;
                    padding: 3px 9px; border-radius: 20px; font-size: 11px;
                    font-weight: 600; white-space: nowrap; border: 1px solid transparent; }
  .badge-dot      { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

  /* ── Toast notifications ─────────────────────────────────────────────── */
  .toast-item     { display:flex; align-items:center; gap:10px;
                    min-width:220px; max-width:360px; padding:12px 16px;
                    border-radius:var(--r-md); font-size:13px; font-weight:500;
                    box-shadow: 0 8px 32px rgba(15,29,56,.18), 0 2px 8px rgba(0,0,0,.08);
                    animation: slideUp .22s ease; backdrop-filter: blur(8px); }
  .toast-success  { background:#0f172a; color:#fff; border-left:3px solid var(--success); }
  .toast-err      { background:#fff; color:var(--danger); border:1px solid var(--danger-b);
                    border-left:3px solid var(--danger); }
  .toast-warn     { background:#fff; color:var(--warning); border:1px solid var(--warning-b);
                    border-left:3px solid var(--warning); }
  .toast-icon     { width:20px; height:20px; border-radius:50%; display:flex; align-items:center;
                    justify-content:center; flex-shrink:0; font-size:11px; font-weight:800; }

  /* ── Empty state ─────────────────────────────────────────────────────── */
  .empty-state    { text-align: center; padding: 64px 20px;
                    background: var(--surface); border-radius: var(--r-xl);
                    border: 1.5px dashed var(--border); }
  .empty-state-icon { font-size: 48px; margin-bottom: 16px; line-height: 1; }
  .empty-state-title { font-size: 16px; font-weight: 700; color: var(--text-2); margin-bottom: 8px; }
  .empty-state-sub   { font-size: 13px; color: var(--text-3); max-width: 320px;
                        margin: 0 auto 20px; line-height: 1.6; }

  /* ── Procurement icon wrapper ────────────────────────────────────────── */
  .ico-box        { display:inline-flex; align-items:center; justify-content:center;
                    border-radius:var(--r-md); flex-shrink:0; }
  .ico-box-sm     { width:32px; height:32px; }
  .ico-box-md     { width:40px; height:40px; }
  .ico-box-lg     { width:48px; height:48px; }

  /* ── Priority dot ─────────────────────────────────────────────────────── */
  .pri-dot        { width:8px; height:8px; border-radius:50%; flex-shrink:0; display:inline-block; }
  .pri-high       { background:var(--danger);  box-shadow:0 0 0 2px rgba(196,26,26,.2); }
  .pri-medium     { background:var(--warning); box-shadow:0 0 0 2px rgba(180,83,9,.2); }
  .pri-low        { background:var(--success); box-shadow:0 0 0 2px rgba(15,123,77,.2); }

  /* ── Zebra row pulse for urgent ─────────────────────────────────────── */
  .row-urgent     { animation: pulseRing 2s infinite; }
  .row-urg-bg     { background: #fff5f5 !important; border-left-color: var(--danger) !important; }
  .row-warn-bg    { background: #fffbf0 !important; border-left-color: var(--warning) !important; }

  /* ── Status progress bar ─────────────────────────────────────────────── */
  .status-track   { height:4px; background:var(--border); border-radius:4px; overflow:hidden; }
  .status-fill    { height:100%; border-radius:4px; transition:width .5s cubic-bezier(.4,0,.2,1); }

  /* ── Utility ─────────────────────────────────────────────────────────── */
  .mono      { font-family: var(--mono); }
  .truncate  { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .anim-up   { animation: slideUp .25s ease; }
  .anim-pop  { animation: popIn .18s ease; }
  .anim-fade { animation: fadeIn .2s ease; }
  .skeleton  { background: linear-gradient(90deg,#f1f5f9 25%,#e2e8f0 50%,#f1f5f9 75%);
               background-size: 400px 100%; animation: shimmer 1.4s infinite;
               border-radius: 4px; }
  .nl        { }   /* shown on desktop */
  .mob-hide  { }
  .desk-only { display: block; }

  /* ── Typographic scale ───────────────────────────────────────────────── */
  .t-xs  { font-size: 10.5px; line-height: 1.4; }
  .t-sm  { font-size: 12px;   line-height: 1.5; }
  .t-base{ font-size: 13.5px; line-height: 1.6; }
  .t-md  { font-size: 15px;   line-height: 1.5; font-weight: 600; }
  .t-lg  { font-size: 18px;   line-height: 1.4; font-weight: 700; }
  .t-xl  { font-size: 22px;   line-height: 1.3; font-weight: 800; letter-spacing: -.03em; }

  /* ── Responsive ──────────────────────────────────────────────────────── */
  @media (max-width: 900px) { .desk-3col { grid-template-columns: 1fr 1fr !important; } }

  /* ── MOBILE  ≤ 767px ─────────────────────────────────────────────────── */

  .mob-sticky-bar { display: none; position: sticky; top: 0; z-index: 100;
                    background: var(--surface); border-bottom: 1px solid var(--border);
                    padding: 8px 12px; flex-direction: column; gap: 6px; }

  /* Mobile tender card */
  .tmob-card { background: var(--surface); border: 1px solid var(--border);
               border-radius: 12px; overflow: hidden; transition: box-shadow var(--t); position: relative; }
  .tmob-card:active { background: #f8faff; }
  .tmob-urg-stripe  { position: absolute; top: 0; left: 0; bottom: 0;
                      width: 4px; border-radius: 12px 0 0 12px; }
  .tmob-body        { padding: 13px 14px 13px 20px; }
  .tmob-top         { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 4px; }
  .tmob-title       { font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.35; flex: 1; min-width: 0; word-break: break-word; }
  .tmob-id          { font-size: 10px; color: var(--text-3); font-family: var(--mono); margin-top: 2px; }
  .tmob-grid        { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 16px; margin: 10px 0 8px; }
  .tmob-cell-label  { font-size: 10px; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 2px; }
  .tmob-cell-value  { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.3; }
  .tmob-cell-value.urgent { color: var(--danger); font-weight: 700; }
  .tmob-cell-value.warn   { color: var(--warning); font-weight: 700; }
  .tmob-cell-value.muted  { color: var(--text-3); }
  .tmob-tags   { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; margin-bottom: 8px; }
  .tmob-expand { border-top: 1px solid var(--border-l); padding: 10px 0 4px; }
  .tmob-detail-grid  { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 16px; margin-bottom: 8px; }
  .tmob-detail-label { font-size: 10px; color: var(--text-3); font-weight: 600; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 1px; }
  .tmob-detail-value { font-size: 12.5px; color: var(--text-2); line-height: 1.4; }
  .tmob-actions { display: flex; gap: 8px; margin-top: 10px; }
  .tmob-btn { flex: 1; min-height: 44px; border-radius: var(--r); border: 1.5px solid var(--border);
              background: var(--surface); color: var(--text-2); font-size: 13px; font-weight: 600;
              font-family: inherit; display: flex; align-items: center; justify-content: center;
              gap: 6px; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: all var(--t); }
  .tmob-btn:active { transform: scale(.97); }
  .tmob-btn.primary { background: var(--blue); border-color: var(--blue); color: #fff; }
  .tmob-btn.danger  { color: var(--danger); border-color: var(--danger-b); background: var(--danger-l); }
  .tmob-toggle { width: 100%; min-height: 44px; border: none; background: none;
                 color: var(--text-3); font-size: 12.5px; font-weight: 600; font-family: inherit;
                 display: flex; align-items: center; justify-content: center; gap: 6px;
                 cursor: pointer; border-top: 1px solid var(--border-l);
                 -webkit-tap-highlight-color: transparent; transition: color var(--t), background var(--t); }
  .tmob-toggle:active { background: var(--surface-2); color: var(--text); }
  .tmob-chip-strip { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none;
                     -webkit-overflow-scrolling: touch; padding-bottom: 2px; }
  .tmob-chip-strip::-webkit-scrollbar { display: none; }
  .tmob-filter-pill { height: 36px; padding: 0 14px; border-radius: 20px; white-space: nowrap; flex-shrink: 0;
                      border: 1.5px solid var(--border); background: var(--surface);
                      font-size: 12.5px; font-weight: 500; font-family: inherit; color: var(--slate);
                      display: inline-flex; align-items: center; gap: 5px; cursor: pointer; }
  .tmob-filter-pill.active { background: var(--blue); border-color: var(--blue); color: #fff; font-weight: 700; }

  .chips-row { display: flex; gap: 6px; }
  .tl-desktop-only { display: block; }
  .tl-mobile-only  { display: none; }

  @media (max-width: 767px) {
    /* Hide desktop sidebar entirely on mobile */
    .sidebar                      { display: none !important; }
    .main-area                    { margin-left: 0 !important; }
    .sidebar-collapsed .main-area { margin-left: 0 !important; }

    .desk-only, .tl-desktop-only { display: none !important; }
    .mob-show, .tl-mobile-only   { display: flex !important; }
    .mob-sticky-bar               { display: flex; }

    .top-bar                      { padding: 0 12px; height: 52px; }
    .top-bar-sub                  { display: none; }
    .top-bar-title                { font-size: 15px; }
    .page-wrap                    { padding: 8px 10px 80px; }
    .chips-row                    { flex-wrap: nowrap; overflow-x: auto; scrollbar-width: none;
                                    -webkit-overflow-scrolling: touch; padding-bottom: 4px; }
    .chips-row::-webkit-scrollbar { display: none; }
    .section-hdr                  { padding: 13px 14px !important; min-height: 50px; }
    .nl, .mob-hide                { display: none !important; }
    .mob-col, .dr4                { grid-template-columns: 1fr !important; }
    .top-bar-title                { font-size: 15px; }
    .tmob-card                    { margin-bottom: 10px; }
  }

  /* ── Data table refinements ──────────────────────────────────────────── */
  .tt-row                  { border-left: 3px solid transparent; }
  .tt-row:hover            { background: var(--blue-l) !important;
                             border-left-color: var(--blue) !important; }
  .tt-row:focus-visible    { outline: 2px solid var(--blue); outline-offset: -2px; }

  /* ── Drawer overlay ──────────────────────────────────────────────────── */
  .drawer-overlay { position: fixed; inset: 0; background: rgba(15,29,56,.45);
                    backdrop-filter: blur(3px); z-index: 400;
                    animation: fadeIn .2s ease; }

  /* ── KPI stat card accent variant ───────────────────────────────────── */
  .kpi-danger  { --accent: var(--danger); }
  .kpi-success { --accent: var(--success); }
  .kpi-warning { --accent: var(--warning); }
  .kpi-info    { --accent: var(--info); }
  .kpi-blue    { --accent: var(--blue); }

  /* ── Section sub-header ──────────────────────────────────────────────── */
  .sub-hdr { font-size: 10px; font-weight: 700; text-transform: uppercase;
             letter-spacing: .08em; color: var(--text-3);
             padding-bottom: 6px; border-bottom: 1px solid var(--border-l);
             margin-bottom: 10px; }

  /* ── Procurement-specific icon tints ────────────────────────────────── */
  .icon-tender    { color: var(--blue);    background: var(--blue-l); }
  .icon-bond      { color: var(--purple);  background: var(--purple-l); }
  .icon-deadline  { color: var(--warning); background: var(--warning-l); }
  .icon-won       { color: var(--success); background: var(--success-l); }
  .icon-lost      { color: var(--danger);  background: var(--danger-l); }
  .icon-analytics { color: var(--cyan);    background: var(--cyan-l); }

  @media print {
    .sidebar, .top-bar { display: none !important; }
    .main-area { margin-left: 0 !important; }
    .page-wrap { padding: 0 !important; }
  }

    async function parseAIMSExcel(file) {
        const XLSX = await import("https://cdn.jsdelivr.net/npm/xlsx@0.18.5/+esm");
        const buf = await file.arrayBuffer();
        const wb = XLSX.read(buf, { type: "array", cellDates: true });
        const records = [];
        const DS = ["Projects-Plexus", "AIMS-Consultations", "AIMS-Sales"];
        for (const sn of wb.SheetNames) {
            if (!DS.includes(sn))
                continue;
            const ws = wb.Sheets[sn];
            const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null });
            let hr = -1;
            for (let i = 0; i < Math.min(10, rows.length); i++) {
                if (rows[i]?.some(c => typeof c === "string" && c.trim() === "Dept")) {
                    hr = i;
                    break;
                }
            }
            if (hr === -1)
                continue;
            const h = rows[hr], col = n => h.findIndex(c => typeof c === "string" && c.trim() === n);
            const [cD, cN, cNu, cTy, cCl, cDt, cV, cP, cSt, cR] = ["Dept", "Tender Name", "Tender Number", "Tender Type", "Client", "Closing Date", "Vendor/Solution", "Price", "Status", "Remarks"].map(col);
            for (let r = hr + 1; r < rows.length; r++) {
                const row = rows[r];
                if (!row)
                    continue;
                const dept = row[cD], name = row[cN];
                if (!dept && !name)
                    continue;
                let cd = "";
                const rd = row[cDt];
                if (rd instanceof Date)
                    cd = rd.toISOString().split("T")[0];
                else if (typeof rd === "string" && rd.trim()) {
                    const dd = new Date(rd);
                    if (!isNaN(dd))
                        cd = dd.toISOString().split("T")[0];
                }
                const rp = row[cP];
                const price = (rp != null && rp !== "" && rp !== "-") ? parseFloat(rp) : null;
                const status = String(row[cSt] || "Pending").trim();
                records.push({ id: genId(), dept: String(dept || "").trim(), tenderName: String(name || "").trim(), tenderNumber: String(row[cNu] || "").trim(), tenderType: String(row[cTy] || "").trim(), client: String(row[cCl] || "").trim(), closingDate: cd, vendor: String(row[cV] || "").trim(), ourBid: isNaN(price) ? null : price, price: null, currency: "KWD", status, priority: "Medium", remarks: String(row[cR] || "").trim(), contactName: "", contactEmail: "", awardDate: "", competitorBids: [], bidBond: EMPTY_BB(), comments: [], statusHistory: [{ status, date: TODAY() }], createdAt: TODAY(), fiscalYear: FY(cd || TODAY()) });
            }
        }
        return records;
    }
